<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<div th:fragment="commentSection">
    <div id="create-form" class="mb-4">
        <div th:if="${errorMessage != null}" class="alert alert-danger py-2 small mb-2" th:text="${errorMessage}"></div>
        <form method="post" th:action="@{/comment/post/{id}/create(id=${postId})}">
            <h6 class="fw-bold mb-3">댓글 작성</h6>
            <div class="row g-2 mb-2">
                <div class="col-6">
                    <input type="text" name="nickname" class="form-control form-control-sm" placeholder="닉네임" value="익명">
                </div>
                <div class="col-6">
                    <input type="password" name="password" class="form-control form-control-sm" placeholder="비밀번호 (숫자 6자리)" value="000000">
                </div>
            </div>
            <div class="d-flex gap-2">
                <input type="text" name="content" class="form-control form-control-sm" placeholder="댓글을 입력하세요">
                <input type="hidden" name="parentId">
                <button type="submit" class="btn btn-primary btn-sm px-3">등록</button>
            </div>
        </form>
    </div>

    <hr class="my-3">
    <h6 class="fw-bold mb-3">댓글 목록</h6>

    <div th:each="comment:${comments}"
         th:style="'margin-left: ' + (${comment.depth} * 24) + 'px'"
         class="border rounded p-2 mb-2 bg-light">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <span class="fw-medium small" th:text="${comment.nickname}"></span>
                <span class="text-muted small ms-2" th:text="${#temporals.format(comment.createdAt, 'MM/dd HH:mm')}"></span>
                <span th:if="${comment.depth > 0}" class="badge bg-secondary ms-1" style="font-size:10px;">답글</span>
            </div>
            <div class="d-flex gap-1">
                <button class="reply-btn btn btn-outline-secondary btn-sm py-0 px-2"
                        th:data-comment-id="${comment.id}"
                        th:data-comment-depth="${comment.depth}"
                        style="font-size:11px;">
                    <i class="bi bi-reply me-1"></i>답글
                </button>
                <button class="confirm-btn btn btn-outline-secondary btn-sm py-0 px-2"
                        th:data-comment-id="${comment.id}"
                        th:data-post-id="${postId}"
                        style="font-size:11px;">
                    <i class="bi bi-gear"></i>
                </button>
            </div>
        </div>
        <p class="mb-0 mt-1 small" th:text="${comment.content}"></p>
    </div>
</div>

</body>
</html>
