<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<div th:fragment="editSection">
    <h6 class="fw-bold mb-3">댓글 수정</h6>
    <div th:if="${errorMessage != null}" class="alert alert-danger py-2 small mb-2" th:text="${errorMessage}"></div>
    <form method="post" th:action="@{/comment/{id}/update(id=${commentId}, postId=${postId})}">
        <div class="mb-2">
            <input type="text" name="content" class="form-control form-control-sm"
                   placeholder="수정할 내용을 입력하세요" th:value="${comment != null ? comment.content : ''}" required>
        </div>
        <div class="d-flex gap-2 justify-content-end">
            <button type="button" class="btn btn-outline-secondary btn-sm cancel-edit-btn">취소</button>
            <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-check-lg me-1"></i>수정 완료
            </button>
        </div>
    </form>
</div>

</body>
</html>
