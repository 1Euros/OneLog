<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OneLog - 글쓰기</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style> body { background-color: #f8f9fa; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; } </style>
</head>
<body>

<div th:insert="~{fragments/layout :: header}"></div>

<div class="container" style="max-width:720px; padding-top:40px; padding-bottom:60px;">
    <div class="d-flex align-items-center mb-4">
        <button onclick="history.back()" class="btn btn-link text-muted p-0 me-3">
            <i class="bi bi-arrow-left fs-5"></i>
        </button>
        <h4 class="fw-bold mb-0">게시글 작성</h4>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form action="/post/create" method="post">

                <div class="mb-3">
                    <label for="boardId" class="form-label fw-medium">게시판</label>
                    <select id="boardId" name="boardId" class="form-select">
                        <option value="">게시판을 선택해주세요</option>
                        <option th:each="board : ${boards}"
                                th:value="${board.id}"
                                th:text="${board.name}"
                                th:selected="${selectedBoardId != null and board.id == selectedBoardId}">
                        </option>
                    </select>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label for="nickname" class="form-label fw-medium">작성자 이름</label>
                        <input id="nickname" type="text" name="nickname" class="form-control"
                               value="익명" placeholder="작성자 이름" maxlength="30" required>
                    </div>
                    <div class="col">
                        <label for="password" class="form-label fw-medium">비밀번호</label>
                        <input id="password" type="password" name="password" class="form-control"
                               value="000000" placeholder="숫자 6자리" pattern="[0-9]{6}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label fw-medium">제목</label>
                    <input id="title" type="text" name="title" class="form-control"
                           placeholder="제목을 입력해주세요" maxlength="100" required>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label fw-medium">내용</label>
                    <textarea id="content" name="content" class="form-control"
                              rows="12" placeholder="내용을 입력해주세요" required></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" onclick="history.back()" class="btn btn-outline-secondary">취소</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send me-1"></i>등록
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:insert="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
