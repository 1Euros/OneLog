<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OneLog - 게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<div th:fragment="editPostSection">
    <h5 class="fw-bold mb-1">게시글 수정</h5>
    <p class="text-muted small mb-3">작성자: <span th:text="${post.nickname}"></span></p>
    <div th:if="${errorMessage != null}" class="alert alert-danger py-2 small" th:text="${errorMessage}"></div>

    <form th:action="@{/post/update/{postId}(postId=${post.id})}" method="post">

        <div class="mb-3">
            <label class="form-label fw-medium small">게시판</label>
            <select name="boardId" class="form-select form-select-sm">
                <option th:each="board : ${boards}"
                        th:value="${board.id}"
                        th:text="${board.name}"
                        th:selected="${board.id == post.board.id}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="title" class="form-label fw-medium small">제목</label>
            <input id="title" type="text" name="title" class="form-control form-control-sm"
                   th:value="${post.title}" maxlength="100" required>
        </div>

        <div class="mb-3">
            <label for="content" class="form-label fw-medium small">내용</label>
            <textarea id="content" name="content" class="form-control form-control-sm"
                      rows="8" required th:text="${post.content}"></textarea>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm cancel-edit-btn">취소</button>
            <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-check-lg me-1"></i>수정 완료
            </button>
        </div>
    </form>
</div>

</body>
</html>
