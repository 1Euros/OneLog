<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세 화면</title>
</head>
<body>

<h1>게시글 상세</h1>

<hr>

<div>
    <p>
        <strong>제목 :</strong>
        <span th:text="${post.title}">게시글 제목</span>
    </p>

    <p>
        <strong>작성자 이름 :</strong>
        <span th:text="${post.nickname}">작성자</span>
    </p>

    <p>
        <strong>생성 날짜 :</strong>
        <span th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd HH:mm')}">
            2026/05/06 14:30
        </span>
    </p>

    <p>
        <strong>조회수 :</strong>
        <span th:text="${post.viewCount}">0</span>
    </p>

    <p>
        <strong>댓글 수 :</strong>
        <span th:text="${commentCount}">0</span>
    </p>
</div>

<hr>

<div>
    <h2>게시글 내용</h2>
    <p th:text="${post.content}">
        게시글 내용입니다.
    </p>
</div>

<button th:onclick="|location.href='@{/confirm/password/post/{id}(id=${post.id})}'|">
    수정/삭제
</button>


<hr>

<div>
    <h2>대표 댓글</h2>

    <div th:if="${#lists.isEmpty(representativeComments)}">
        <p>아직 댓글이 없습니다.</p>
    </div>

    <div th:each="comment : ${representativeComments}">
        <p>
            <strong>댓글 작성자 :</strong>
            <span th:text="${comment.nickname}">댓글 작성자</span>
        </p>

        <p>
            <strong>댓글 내용 :</strong>
            <span th:text="${comment.content}">댓글 내용</span>
        </p>
    </div>
    <button id="moreCommentsBtn" th:data-post-id="${post.id}">댓글 더 보기</button>
</div>

<!-- 모달 -->
<div id="commentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(0,0,0,0.5); z-index:999;">
    <div style="background:white; margin:10% auto; padding:20px; width:60%; max-height:70vh; overflow-y:auto;">
        <button id="closeModal">닫기</button>
        <div id="commentContent"></div>
    </div>
</div>

<hr>

<div>
    <a href="/post">목록으로</a>
</div>

<script>
    const btn = document.getElementById('moreCommentsBtn');
    const modal = document.getElementById('commentModal');
    const content = document.getElementById('commentContent');
    const postId = btn.dataset.postId;

    async function loadComments() {
        const res = await fetch(`/comment/post/${postId}/comments/fragment`);
        content.innerHTML = await res.text();
        attachFormListener();
    }

    function attachFormListener() {
        // 모든 폼에 fetch submit 부착 (댓글작성, 비밀번호확인, 댓글수정 공통 처리)
        content.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                // formaction 버튼(수정/삭제)이 클릭된 경우 해당 action 사용
                const action = e.submitter?.getAttribute('formaction') || form.action;
                const res = await fetch(action, {
                    method: 'POST',
                    body: new FormData(form)
                });
                content.innerHTML = await res.text();
                attachFormListener();
            });
        });

        // 대댓글 버튼
        const commentForm = content.querySelector('#create-form form');
        if (commentForm) {
            content.querySelectorAll('.reply-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const existing = btn.closest('div').nextElementSibling;
                    if (existing?.classList.contains('reply-form')) {
                        existing.remove();
                        return;
                    }

                    const commentId = btn.dataset.commentId;
                    const replyForm = commentForm.cloneNode(true);
                    replyForm.classList.add('reply-form');
                    replyForm.querySelector('h2')?.remove();
                    replyForm.querySelector('[name=parentId]').value = commentId;

                    replyForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const res = await fetch(replyForm.action, {
                            method: 'POST',
                            body: new FormData(replyForm)
                        });
                        content.innerHTML = await res.text();
                        attachFormListener();
                    });

                    btn.closest('div').after(replyForm);
                });
            });
        }

        // 수정/삭제 버튼
        content.querySelectorAll('.confirm-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const commentId = btn.dataset.commentId;
                const postId = btn.dataset.postId;
                const res = await fetch(`/confirm/password/comment/${commentId}/fragment?postId=${postId}`);
                content.innerHTML = await res.text();
                attachFormListener();
            });
        });
    }

    btn.addEventListener('click', async () => {
        await loadComments();
        modal.style.display = 'block';
    });

    document.getElementById('closeModal').addEventListener('click', () => {
        modal.style.display = 'none';
        location.reload();
    });
</script>
</body>
</html>
