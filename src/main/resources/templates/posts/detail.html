<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OneLog</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
        .nav-link:hover { background-color: #e9ecef !important; }
    </style>
</head>
<body>

<div th:insert="~{fragments/layout :: header}"></div>

<div class="d-flex" style="min-height: calc(100vh - 56px - 52px);">
    <div th:insert="~{fragments/layout :: sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="card-title fw-bold mb-3" th:text="${post.title}">제목</h4>
                <div class="d-flex gap-3 text-muted small mb-3 border-bottom pb-3">
                    <span><i class="bi bi-person me-1"></i><span th:text="${post.nickname}"></span></span>
                    <span><i class="bi bi-calendar me-1"></i><span th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd HH:mm')}"></span></span>
                    <span><i class="bi bi-eye me-1"></i><span th:text="${post.viewCount}"></span></span>
                    <span><i class="bi bi-chat me-1"></i><span th:text="${commentCount}"></span></span>
                </div>
                <p class="card-text" style="white-space: pre-wrap;" th:text="${post.content}"></p>
            </div>
            <div class="card-footer bg-white d-flex justify-content-between">
                <a href="/post" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>목록으로
                </a>
                <button id="postConfirmBtn" th:data-post-id="${post.id}" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-gear me-1"></i>수정/삭제
                </button>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h6 class="fw-bold mb-3"><i class="bi bi-chat-dots me-2"></i>대표 댓글</h6>
                <div th:if="${#lists.isEmpty(representativeComments)}" class="text-muted small text-center py-3">
                    아직 댓글이 없습니다.
                </div>
                <div th:each="comment : ${representativeComments}" class="border rounded p-2 mb-2 bg-light">
                    <div class="fw-medium small" th:text="${comment.nickname}"></div>
                    <div class="text-muted small" th:text="${comment.content}"></div>
                </div>
                <button id="moreCommentsBtn" th:data-post-id="${post.id}" class="btn btn-outline-primary btn-sm w-100 mt-2">
                    <i class="bi bi-chevron-down me-1"></i>댓글 더 보기
                </button>
            </div>
        </div>
    </main>
</div>

<!-- 댓글 모달 -->
<div id="commentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(0,0,0,0.5); z-index:1050;">
    <div class="bg-white mx-auto mt-5 rounded shadow" style="width:60%; max-height:80vh; overflow-y:auto; position:relative;">
        <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
            <h6 class="mb-0 fw-bold"><i class="bi bi-chat-dots me-2"></i>댓글</h6>
            <button id="closeModal" class="btn-close"></button>
        </div>
        <div id="commentContent" class="p-3"></div>
    </div>
</div>

<!-- 게시글 수정/삭제 모달 -->
<div id="postModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(0,0,0,0.5); z-index:1050; justify-content:center; align-items:center;">
    <div class="bg-white rounded shadow p-4" style="width:500px; max-height:80vh; overflow-y:auto; position:relative;">
        <button id="closePostModal" class="btn-close position-absolute" style="top:12px; right:12px;"></button>
        <div id="postModalContent"></div>
    </div>
</div>

<div th:insert="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const btn = document.getElementById('moreCommentsBtn');
    const modal = document.getElementById('commentModal');
    const content = document.getElementById('commentContent');
    const postId = btn.dataset.postId;

    async function loadComments() {
        const res = await fetch(`/comment/post/${postId}/comments/fragment`);
        content.innerHTML = await res.text();
        attachFormListener();
    }

    function attachFormListener() {
        content.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const action = e.submitter?.getAttribute('formaction') || form.action;
                const res = await fetch(action, { method: 'POST', body: new FormData(form) });
                content.innerHTML = await res.text();
                attachFormListener();
            });
        });

        const commentForm = content.querySelector('#create-form form');
        if (commentForm) {
            content.querySelectorAll('.reply-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const existing = btn.closest('div').nextElementSibling;
                    if (existing?.classList.contains('reply-form')) { existing.remove(); return; }
                    const commentId = btn.dataset.commentId;
                    const replyForm = commentForm.cloneNode(true);
                    replyForm.classList.add('reply-form');
                    replyForm.querySelector('h2')?.remove();
                    replyForm.querySelector('[name=parentId]').value = commentId;
                    replyForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const res = await fetch(replyForm.action, { method: 'POST', body: new FormData(replyForm) });
                        content.innerHTML = await res.text();
                        attachFormListener();
                    });
                    btn.closest('div').after(replyForm);
                });
            });
        }

        content.querySelectorAll('.confirm-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const commentId = btn.dataset.commentId;
                const postId = btn.dataset.postId;
                const res = await fetch(`/confirm/password/comment/${commentId}/fragment?postId=${postId}`);
                content.innerHTML = await res.text();
                attachFormListener();
            });
        });

        content.querySelector('.cancel-edit-btn')?.addEventListener('click', async () => {
            await loadComments();
        });
    }

    btn.addEventListener('click', async () => {
        await loadComments();
        modal.style.display = 'block';
    });

    document.getElementById('closeModal').addEventListener('click', () => {
        modal.style.display = 'none';
        location.reload();
    });

    // 게시글 수정/삭제 모달
    const postModal = document.getElementById('postModal');
    const postModalContent = document.getElementById('postModalContent');
    const postConfirmBtn = document.getElementById('postConfirmBtn');
    const postId2 = postConfirmBtn.dataset.postId;

    document.getElementById('closePostModal').addEventListener('click', () => {
        postModal.style.display = 'none';
    });

    postConfirmBtn.addEventListener('click', async () => {
        const res = await fetch(`/confirm/password/post/${postId2}/fragment`);
        postModalContent.innerHTML = await res.text();
        postModal.style.display = 'flex';
        attachPostModalListeners();
    });

    function attachPostModalListeners() {
        postModalContent.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const action = e.submitter?.getAttribute('formaction') || form.action;
                if (action.includes('/delete')) {
                    if (!confirm('정말로 삭제하시겠습니까?')) return;
                }
                const res = await fetch(action, { method: 'POST', body: new FormData(form) });
                if (res.redirected) {
                    postModal.style.display = 'none';
                    location.href = res.url;
                } else {
                    postModalContent.innerHTML = await res.text();
                    attachPostModalListeners();
                }
            });
        });
        postModalContent.querySelector('.cancel-edit-btn')?.addEventListener('click', () => {
            postModal.style.display = 'none';
        });
    }
</script>
</body>
</html>
