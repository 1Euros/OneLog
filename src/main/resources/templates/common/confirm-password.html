<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<div th:fragment="confirmSection">
    <h6 class="fw-bold mb-3"><i class="bi bi-lock me-2"></i>비밀번호 확인</h6>
    <div th:if="${errorMessage != null}" class="alert alert-danger py-2 small mb-2" th:text="${errorMessage}"></div>
    <form method="post">
        <div class="mb-3">
            <input id="password" type="password" name="password" value="000000"
                   class="form-control form-control-sm" placeholder="비밀번호 6자리">
            <input type="hidden" name="domain" th:value="${domain}">
            <input type="hidden" name="domainId" th:value="${domainId}">
        </div>
        <div class="d-flex gap-2 justify-content-end">
            <button type="submit"
                    th:attr="formaction=@{/confirm/password/{domain}/{domainId}/edit(domain=${domain}, domainId=${domainId}, postId=${postId})}"
                    class="btn btn-primary btn-sm">
                <i class="bi bi-pencil me-1"></i>수정
            </button>
            <button type="submit"
                    th:attr="formaction=@{/confirm/password/{domain}/{domainId}/delete(domain=${domain}, domainId=${domainId}, postId=${postId})}"
                    class="btn btn-danger btn-sm">
                <i class="bi bi-trash me-1"></i>삭제
            </button>
        </div>
    </form>
</div>

</body>
</html>
