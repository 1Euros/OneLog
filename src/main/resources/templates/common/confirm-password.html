<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 확인</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<div th:fragment="confirmSection" class="card bg-base-100 shadow-none">

    <div class="card-body">

        <h2 class="card-title">비밀번호 확인</h2>

        <p class="text-sm text-base-content/60">
            수정 또는 삭제를 진행하려면 작성 시 입력한 비밀번호를 입력해주세요.
        </p>

        <div th:if="${errorMessage != null}" class="alert alert-error mt-2">
            <span th:text="${errorMessage}">에러 메시지</span>
        </div>

        <form method="post" class="space-y-4 mt-2">

            <div>
                <label class="label" for="password">
                    <span class="label-text">비밀번호</span>
                </label>

                <input id="password"
                       type="password"
                       name="password"
                       value="000000"
                       class="input input-bordered w-full">

                <p class="text-xs text-base-content/50 mt-1">
                    숫자 6자리 비밀번호를 입력해주세요.
                </p>
            </div>

            <input type="hidden" name="domain" th:value="${domain}">
            <input type="hidden" name="domainId" th:value="${domainId}">

            <div class="card-actions justify-between">
                <button type="submit"
                        class="delete-btn btn btn-error btn-outline"
                        th:attr="formaction=@{/confirm/password/{domain}/{domainId}/delete(domain=${domain}, domainId=${domainId}, postId=${postId})}">
                    삭제
                </button>

                <button type="submit"
                        class="btn btn-primary"
                        th:attr="formaction=@{/confirm/password/{domain}/{domainId}/edit(domain=${domain}, domainId=${domainId}, postId=${postId})}">
                    수정
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
