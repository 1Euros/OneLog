<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OneLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Header Fragment -->
<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold fs-4" href="/post">
            <i class="bi bi-journal-richtext me-2"></i>OneLog
        </a>
    </div>
</nav>

<!-- Footer Fragment -->
<footer th:fragment="footer" class="bg-white border-top py-3 mt-auto">
    <div class="container text-center">
        <small class="text-muted">© 2026 OneLog. All rights reserved.</small>
    </div>
</footer>

<!-- Sidebar Fragment -->
<div th:fragment="sidebar" class="bg-white border-end d-flex flex-column p-3" style="width:220px; min-height:100vh; position:sticky; top:0;">
    <button id="addBoardBtn" class="btn btn-primary btn-sm mb-3 w-100">
        <i class="bi bi-plus-lg me-1"></i>게시판 추가
    </button>
    <p class="text-muted small fw-bold text-uppercase mb-2 px-1">게시판 목록</p>
    <ul class="nav nav-pills flex-column gap-1">
        <li th:each="board : ${sidebarBoards}" class="nav-item">
            <a th:href="@{/post/board/{id}/posts(id=${board.id})}"
               th:text="${board.name}"
               class="nav-link text-dark px-2 py-1 rounded"></a>
        </li>
    </ul>

    <!-- 게시판 생성 모달 -->
    <div id="boardModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
         background:rgba(0,0,0,0.5); z-index:1050; justify-content:center; align-items:center;">
        <div class="bg-white rounded shadow p-4" style="width:360px; position:relative;">
            <div id="boardModalContent"></div>
        </div>
    </div>

    <script>
        document.getElementById('addBoardBtn').addEventListener('click', async () => {
            const res = await fetch('/board/create-open/fragment');
            document.getElementById('boardModalContent').innerHTML = await res.text();
            document.getElementById('boardModal').style.display = 'flex';
            attachBoardModalListeners();
        });

        function attachBoardModalListeners() {
            document.querySelector('.close-btn')?.addEventListener('click', () => {
                document.getElementById('boardModal').style.display = 'none';
            });

            document.querySelector('#boardModalContent form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                const res = await fetch(form.action, { method: 'POST', body: new FormData(form) });
                if (!res.redirected) {
                    document.getElementById('boardModalContent').innerHTML = await res.text();
                    attachBoardModalListeners();
                } else {
                    document.getElementById('boardModal').style.display = 'none';
                    location.href = res.url;
                }
            });
        }
    </script>
</div>

</body>
</html>
