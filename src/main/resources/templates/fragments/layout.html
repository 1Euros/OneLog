<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:replace="~{:: title}">OneLog</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

<!-- 헤더 fragment -->
<header th:fragment="header">
    <div class="navbar bg-base-100 border-b border-base-300 sticky top-0 z-30 shadow-sm">
        <div class="navbar-start">
            <a href="/post" class="btn btn-ghost text-xl font-bold tracking-tight">
                <span class="text-primary">One</span>Log
            </a>
        </div>

        <div class="navbar-center hidden md:flex">
            <span class="text-sm text-base-content/60">
                익명 게시판 프로젝트
            </span>
        </div>

        <div class="navbar-end gap-2">
            <a href="/post" class="btn btn-ghost btn-sm hidden sm:flex">
                전체 글
            </a>

            <a href="/post/create" class="btn btn-primary btn-sm">
                글쓰기
            </a>
        </div>
    </div>
</header>

<!-- 왼쪽 사이드바 fragment -->
<div th:fragment="sidebar" class="h-full flex flex-col">


    <!-- 전체 게시글 -->
    <a href="/post"
       class="btn btn-ghost w-full justify-start mb-3"
       th:classappend="${board == null} ? ' btn-active' : ''">
        전체 게시글
    </a>

    <!-- 게시판 추가 버튼 -->
    <button id="addBoardBtn"
            type="button"
            class="btn btn-primary btn-sm w-full mb-4">
        + 게시판 추가
    </button>

    <div class="divider my-2">
        게시판 목록
    </div>

    <!-- 게시판 목록 -->
    <div class="flex-1 overflow-y-auto">
        <ul class="p-0 space-y-1">

            <li th:if="${sidebarBoards != null}"
                th:each="sideBoard : ${sidebarBoards}"
                class="list-none">

                <a th:href="@{/post/board/{id}/posts(id=${sideBoard.id})}"
                   th:text="${sideBoard.name}"
                   class="btn btn-ghost w-full justify-start rounded-full mb-1"
                   th:classappend="${board != null and board.id == sideBoard.id} ? ' btn-active font-semibold' : ''">
                    게시판 이름
                </a>

            </li>

        </ul>

        <div th:if="${sidebarBoards == null or #lists.isEmpty(sidebarBoards)}"
             class="text-sm text-base-content/50 mt-4 text-center">
            아직 게시판이 없습니다.
        </div>
    </div>

    <!-- 하단 안내 -->
    <div class="mt-6 p-3 rounded-box bg-base-200 text-xs text-base-content/60">
        게시판을 선택하면 해당 게시판의 글만 볼 수 있습니다.
    </div>

    <!-- 게시판 생성 모달 -->
    <div id="boardModal"
         class="hidden fixed inset-0 bg-black/60 z-[99999] items-center justify-center">

        <div id="boardModalContent"
             class="relative z-[100000] w-full max-w-md mx-4">
        </div>
    </div>

    <script>
        const addBoardBtn = document.getElementById('addBoardBtn');
        const boardModal = document.getElementById('boardModal');
        const boardModalContent = document.getElementById('boardModalContent');

        if (addBoardBtn) {
            addBoardBtn.addEventListener('click', async () => {
                const res = await fetch('/board/create-open/fragment');
                boardModalContent.innerHTML = await res.text();

                /*
                 * 중요:
                 * boardModal은 sidebar fragment 안에 들어있기 때문에,
                 * 그대로 열면 사이드바 레이어 안에서 뜨면서 뒤쪽으로 깔릴 수 있음.
                 * body 맨 아래로 옮겨서 최상위 레이어에서 뜨게 만든다.
                 */
                if (boardModal.parentElement !== document.body) {
                    document.body.appendChild(boardModal);
                }

                boardModal.classList.remove('hidden');
                boardModal.classList.add('flex');

                attachBoardModalListeners();
            });
        }

        function closeBoardModal() {
            boardModal.classList.add('hidden');
            boardModal.classList.remove('flex');
        }

        function attachBoardModalListeners() {
            boardModalContent.querySelector('.close-btn')?.addEventListener('click', () => {
                closeBoardModal();
            });

            boardModalContent.querySelector('form')?.addEventListener('submit', async (e) => {
                e.preventDefault();

                const form = e.target;

                const res = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form)
                });

                if (!res.redirected) {
                    boardModalContent.innerHTML = await res.text();
                    attachBoardModalListeners();
                } else {
                    closeBoardModal();
                    location.href = res.url;
                }
            });
        }
    </script>

</div>
<!-- 푸터 fragment -->
<footer th:fragment="footer">
    <footer class="footer footer-center p-6 bg-neutral text-neutral-content border-t border-neutral/30">
        <p class="text-sm">
            © 2026 <span class="font-semibold">OneLog</span>. All rights reserved.
        </p>
    </footer>
</footer>

</body>
</html>
