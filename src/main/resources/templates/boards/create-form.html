<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<div id="create-board-modal" th:fragment="createForm" class="position-relative">
    <h6 class="fw-bold mb-3">게시판 추가</h6>
    <div th:if="${errorMessage != null}" class="alert alert-danger py-2 small mb-2" th:text="${errorMessage}"></div>
    <form th:action="@{/board/create}" th:object="${boardRequestDto}" method="post">
        <div class="mb-3">
            <input type="text"
                   th:field="*{name}"
                   class="form-control form-control-sm"
                   placeholder="게시판 이름을 입력하세요"
                   required>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm close-btn">취소</button>
            <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>추가
            </button>
        </div>
    </form>
</div>

</body>
</html>
