<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판 수정/삭제</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<div th:fragment="updateForm" class="card bg-base-100 shadow-2xl">

    <div class="card-body relative">

        <button type="button"
                class="close-btn btn btn-sm btn-circle btn-ghost absolute right-3 top-3 z-[100001] bg-base-100 shadow">
            ✕
        </button>

        <h2 class="card-title text-xl">게시판 수정/삭제</h2>

        <form th:object="${boardRequestDto}" method="post" class="space-y-4 mt-2">

            <div>
                <label class="label" for="name">
                    <span class="label-text">게시판 이름</span>
                </label>

                <input type="text"
                       th:field="*{name}"
                       id="name"
                       placeholder="새 이름을 입력하세요"
                       class="input input-bordered w-full"
                       required>

                <p th:if="${errorMessage}"
                   th:text="${errorMessage}"
                   class="text-error text-sm mt-2">
                    에러 메시지
                </p>
            </div>

            <div class="card-actions justify-between">
                <button type="submit"
                        th:formaction="@{/board/delete/{id}(id=${boardId})}"
                        class="delete-btn btn btn-error btn-outline">
                    삭제
                </button>

                <button type="submit"
                        th:formaction="@{/board/update/{id}(id=${boardId})}"
                        class="update-btn btn btn-primary">
                    수정
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
