<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<div id="update-board-modal" th:fragment="updateForm" class="position-relative">
    <h6 class="fw-bold mb-3">게시판 수정/삭제</h6>
    <div th:if="${errorMessage}" class="alert alert-danger py-2 small mb-2" th:text="${errorMessage}"></div>
    <form th:object="${boardRequestDto}" method="post">
        <div class="mb-3">
            <input type="text" th:field="*{name}" id="name"
                   class="form-control form-control-sm"
                   placeholder="새 이름을 입력하세요" required>
        </div>
        <div class="d-flex justify-content-between gap-2">
            <button type="submit" th:formaction="@{/board/delete/{id}(id=${boardId})}"
                    class="btn btn-danger btn-sm delete-btn">
                <i class="bi bi-trash me-1"></i>삭제
            </button>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary btn-sm close-btn">취소</button>
                <button type="submit" th:formaction="@{/board/update/{id}(id=${boardId})}"
                        class="btn btn-primary btn-sm update-btn">
                    <i class="bi bi-check-lg me-1"></i>수정
                </button>
            </div>
        </div>
    </form>
</div>

</body>
</html>
