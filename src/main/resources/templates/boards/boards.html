<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판 정보</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-200 min-h-screen">

<div class="flex min-h-screen">

    <!-- 왼쪽 사이드바 -->
    <aside class="w-64 min-h-screen bg-base-100 border-r border-base-300 p-4 sticky top-0">
        <div th:insert="~{fragments/layout :: sidebar}"></div>
    </aside>

    <!-- 본문 -->
    <main class="flex-1 p-8">
        <div class="max-w-2xl mx-auto space-y-6">

            <div>
                <a href="/post" class="btn btn-ghost mb-4">
                    ← 게시글 목록으로
                </a>

                <h1 class="text-3xl font-bold">
                    게시판 정보
                </h1>

                <p class="text-sm text-base-content/60 mt-2">
                    생성된 게시판 정보를 확인할 수 있습니다.
                </p>
            </div>

            <div class="card bg-base-100 shadow-sm border border-base-300">
                <div class="card-body space-y-4">

                    <div class="flex items-center justify-between">
                        <span class="badge badge-primary badge-outline">
                            Board
                        </span>

                        <span class="text-sm text-base-content/50">
                            ID:
                            <span th:text="${board.id}">1</span>
                        </span>
                    </div>

                    <div>
                        <h2 class="card-title text-2xl"
                            th:text="${board.name}">
                            게시판 이름
                        </h2>

                        <p class="text-sm text-base-content/60 mt-2">
                            생성일:
                            <span th:text="${#temporals.format(board.createdAt, 'yyyy/MM/dd HH:mm')}">
                                2026/05/07 12:00
                            </span>
                        </p>
                    </div>

                    <div class="divider"></div>

                    <div class="card-actions justify-end gap-2">
                        <a href="/post" class="btn btn-ghost">
                            전체 목록
                        </a>

                        <a th:href="@{/post/board/{boardId}/posts(boardId=${board.id})}"
                           class="btn btn-primary">
                            이 게시판으로 이동
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </main>

</div>

</body>
</html>
